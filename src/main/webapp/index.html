<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>用户接口测试（调试版）</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .section { border: 1px solid #ccc; margin-bottom: 20px; padding: 15px; border-radius: 5px; }
        input { margin: 5px; padding: 8px; width: 200px; display: block; }
        button { margin-top: 10px; padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; max-height: 300px; overflow: auto; }
        .note { background: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; margin-bottom: 20px; }
        .role-select { margin: 10px 0; }
        .role-option { margin-right: 15px; }
    </style>
</head>
<body>
<h1>助教招聘系统 - 登录/注册</h1>

<div class="note">
    <strong>⚠️ 配置提示：</strong> 上下文路径默认 /tapj<br>
    当前 BASE_URL: <span id="baseUrlDisplay"></span>
</div>
<div>
    <input type="text" id="baseUrlInput" placeholder="例如 /tapj" value="/tapj">
    <button onclick="updateBaseUrl()">更新BASE_URL</button>
</div>

<!-- TA 注册 -->
<div class="section">
    <h2>TA 注册</h2>
    <input type="text" id="regUsername" placeholder="用户名" value="ta001">
    <input type="password" id="regPassword" placeholder="密码" value="123456">
    <input type="text" id="regRealName" placeholder="真实姓名" value="张三">
    <input type="email" id="regEmail" placeholder="邮箱" value="zhangsan@example.com">
    <input type="text" id="regStudentId" placeholder="学号" value="2024001">
    <input type="text" id="regMajor" placeholder="专业" value="计算机科学">
    <input type="text" id="regEducation" placeholder="学历" value="硕士">
    <input type="text" id="regGrade" placeholder="年级" value="研二">
    <button onclick="registerTA()">注册 TA</button>
</div>

<!-- MO 注册 -->
<div class="section">
    <h2>MO 注册（教师/管理员）</h2>
    <input type="text" id="moRegUsername" placeholder="用户名" value="mo001">
    <input type="password" id="moRegPassword" placeholder="密码" value="123456">
    <input type="text" id="moRegRealName" placeholder="真实姓名" value="李老师">
    <input type="email" id="moRegEmail" placeholder="邮箱" value="mo@bupt.edu.cn">
    <input type="text" id="moRegCourse" placeholder="负责课程" value="软件工程">
    <button onclick="registerMO()">注册 MO</button>
</div>

<!-- 登录（通用） -->
<div class="section">
    <h2>登录（TA/MO/Admin通用）</h2>
    <input type="text" id="loginUsername" placeholder="用户名" value="admin">
    <input type="password" id="loginPassword" placeholder="密码" value="123456">
    <button onclick="login()">登录</button>
</div>

<!-- 获取当前用户 -->
<div class="section">
    <h2>获取登录用户信息</h2>
    <button onclick="getLoginUser()">获取用户信息</button>
    <pre id="userInfo">点击按钮获取</pre>
</div>

<!-- 响应显示区域 -->
<div class="section">
    <h2>服务器响应（原始）</h2>
    <pre id="response">等待操作...</pre>
</div>

<script>
    let BASE_URL = '/tapj';
    updateBaseUrlDisplay();

    function updateBaseUrlDisplay() {
        document.getElementById('baseUrlDisplay').innerText = BASE_URL;
    }
    function updateBaseUrl() {
        BASE_URL = document.getElementById('baseUrlInput').value.trim();
        updateBaseUrlDisplay();
        showResponse({info:"更新成功："+BASE_URL});
    }

    function showResponse(data) {
        document.getElementById('response').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    async function request(url, options = {}) {
        try {
            const res = await fetch(BASE_URL + url, {
                credentials: 'include',
                ...options
            });
            const text = await res.text();
            try {
                return { ok: true, data: JSON.parse(text) };
            } catch (e) {
                return { ok: false, raw: text };
            }
        } catch (e) {
            return { ok: false, error: e.message };
        }
    }

    // TA注册
    async function registerTA() {
        const p = new URLSearchParams();
        p.append('username', document.getElementById('regUsername').value);
        p.append('password', document.getElementById('regPassword').value);
        p.append('realName', document.getElementById('regRealName').value);
        p.append('email', document.getElementById('regEmail').value);
        p.append('studentId', document.getElementById('regStudentId').value);
        p.append('major', document.getElementById('regMajor').value);
        p.append('education', document.getElementById('regEducation').value);
        p.append('grade', document.getElementById('regGrade').value);
        const r = await request('/user?action=registerTA', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:p});
        showResponse(r.data || r.raw);
    }

    // MO注册
    async function registerMO() {
        const p = new URLSearchParams();
        p.append('username', document.getElementById('moRegUsername').value);
        p.append('password', document.getElementById('moRegPassword').value);
        p.append('realName', document.getElementById('moRegRealName').value);
        p.append('email', document.getElementById('moRegEmail').value);
        p.append('course', document.getElementById('moRegCourse').value);
        const r = await request('/user?action=registerMO', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:p});
        showResponse(r.data || r.raw);
    }

    // 登录（通用）
    async function login() {
        const p = new URLSearchParams();
        p.append('username', document.getElementById('loginUsername').value);
        p.append('password', document.getElementById('loginPassword').value);
        const r = await request('/user?action=login', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:p});
        if(r.ok && r.data.code === 200) {
            alert("登录成功！");
            location.href = "main.html";
        } else {
            showResponse(r.data || r.raw);
        }
    }

    // 获取登录用户
    async function getLoginUser() {
        const r = await request('/user?action=getLoginUser', {method:'GET'});
        if(r.ok) {
            document.getElementById('userInfo').textContent = JSON.stringify(r.data, null, 2);
            showResponse(r.data);
        }
    }
</script>
</body>
</html>
