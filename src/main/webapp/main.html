<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>助教招聘系统 - 主界面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .user-info { font-size: 16px; }
        .btn { padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .btn-danger { background: #dc3545; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .section { border: 1px solid #ddd; padding: 15px; margin: 15px 0; border-radius: 6px; }
        .section h3 { margin-top: 0; color: #333; }
        input, select, textarea { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
        textarea { width: 400px; height: 80px; }
        .card { border: 1px solid #eee; padding: 12px; margin: 8px 0; border-radius: 4px; background: #f9f9f9; }
        .card-title { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        .card-meta { color: #666; font-size: 14px; margin-bottom: 8px; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; max-height: 300px; overflow: auto; }
        .hidden { display: none !important; }
        .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; color: white; }
        .role-ta { background: #17a2b8; }
        .role-mo { background: #6610f2; }
        .role-admin { background: #343a40; }
        .status-tag { padding: 3px 8px; border-radius: 3px; font-size: 12px; color: white; margin-left: 8px; }
        .status-pending { background: #ffc107; }
        .status-pass { background: #28a745; }
        .status-reject { background: #dc3545; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; font-weight: bold; }

        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 10000;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .modal-title {
            margin: 0;
            font-size: 22px;
        }
        .close-btn {
            background: #f0f0f0;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover { background: #e0e0e0; }
        .detail-item {
            margin: 10px 0;
        }
        .detail-label {
            font-weight: bold;
            color: #333;
            display: inline-block;
            width: 140px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>助教招聘系统</h1>
    <div class="user-info">
        <span id="userDisplay"></span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<!-- ================================== -->
<!-- TA 功能区 -->
<!-- ================================== -->
<div id="taSection" class="hidden">
    <div class="section">
        <h3>📋 招聘中岗位列表</h3>
        <button class="btn" onclick="loadOpenJobs()">刷新岗位</button>
        <div id="openJobList"></div>
    </div>

    <div class="section">
        <h3>📝 我的申请记录</h3>
        <button class="btn" onclick="loadMyApplications()">查看我的申请</button>
        <div id="myApplicationList"></div>
    </div>
</div>

<!-- ================================== -->
<!-- MO 功能区 -->
<!-- ================================== -->
<div id="moSection" class="hidden">
    <div class="section">
        <h3>➕ 发布新岗位</h3>
        <div>
            <input type="text" id="jobName" placeholder="岗位名称"><br>
            <select id="jobType">
                <option value="1">助教</option>
                <option value="2">助理</option>
            </select>
            <input type="text" id="belongModule" placeholder="所属模块"><br>
            <textarea id="jobDesc" placeholder="岗位描述"></textarea><br>
            <input type="number" id="workHoursWeekly" placeholder="每周工作时长"><br>
            <input type="number" id="recruitNum" placeholder="招聘人数"><br>
            <input type="text" id="applyDeadline" placeholder="申请截止日期 (YYYY-MM-DD)"><br>
            <button class="btn btn-success" onclick="publishJob()">发布岗位</button>
        </div>
    </div>

    <div class="section">
        <h3>📋 我发布的岗位</h3>
        <button class="btn" onclick="loadMyJobs()">刷新我的岗位</button>
        <div id="myJobList"></div>
    </div>

    <div class="section">
        <h3>👥 查看岗位申请人（仅待审核）</h3>
        <input type="text" id="queryJobId" placeholder="输入岗位ID">
        <button class="btn" onclick="loadJobApplications()">查询申请人</button>
        <div id="jobApplicationList"></div>
    </div>
</div>

<!-- ================================== -->
<!-- Admin 功能区（新增！） -->
<!-- ================================== -->
<div id="adminSection" class="hidden">
    <div class="section">
        <h3>👥 所有用户管理</h3>
        <button class="btn" onclick="loadAllUsers()">刷新用户列表</button>
        <div class="table-container">
            <table id="userTable">
                <thead>
                <tr>
                    <th>用户ID</th>
                    <th>用户名</th>
                    <th>真实姓名</th>
                    <th>角色</th>
                    <th>邮箱</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="userTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h3>📋 所有岗位管理</h3>
        <button class="btn" onclick="loadAllJobs()">刷新岗位列表</button>
        <div class="table-container">
            <table id="jobTable">
                <thead>
                <tr>
                    <th>岗位ID</th>
                    <th>岗位名称</th>
                    <th>发布者ID</th>
                    <th>招聘人数</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="jobTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h3>📊 用户详情查看</h3>
        <input type="text" id="detailUserId" placeholder="输入用户ID">
        <button class="btn" onclick="loadUserDetail()">查看详情</button>
        <pre id="userDetailContent">等待查询...</pre>
    </div>
</div>

<!-- 响应显示区域 -->
<div class="section">
    <h3>📡 服务器响应</h3>
    <pre id="response">等待操作...</pre>
</div>

<!-- ================================== -->
<!-- 岗位详情模态框 -->
<!-- ================================== -->
<div id="jobDetailModal" class="modal-overlay hidden" onclick="closeOnOverlay(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title" id="modalJobName">岗位详情</h2>
            <button class="close-btn" onclick="closeJobDetail()">&times;</button>
        </div>
        <div id="jobDetailContent">
            <!-- 详情内容会动态填充 -->
        </div>
        <div style="margin-top: 20px; text-align: right;">
            <button class="btn btn-secondary" onclick="closeJobDetail()">关闭</button>
            <button id="applyBtn" class="btn btn-success" onclick="applyFromDetail()">申请此岗位</button>
        </div>
    </div>
</div>

<script>
    const BASE_URL = '/tapj';
    let currentUser = null;
    let currentJobId = null;

    // 页面加载
    window.onload = function() {
        loadLoginUser();
    };

    // 显示响应
    function showResponse(data) {
        document.getElementById('response').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    // 通用请求
    async function request(url, options = {}) {
        try {
            const res = await fetch(BASE_URL + url, {
                credentials: 'include',
                ...options
            });
            const text = await res.text();
            try {
                return { ok: true, data: JSON.parse(text) };
            } catch (e) {
                return { ok: false, raw: text };
            }
        } catch (e) {
            return { ok: false, error: e.message };
        }
    }

    // 获取当前用户
    async function loadLoginUser() {
        const r = await request('/user?action=getLoginUser');
        if (r.ok && r.data.code === 200) {
            currentUser = r.data.data;
            displayUserInfo();
            showRoleSection();
        } else {
            alert('未登录或登录已过期，请重新登录');
            location.href = 'index.html';
        }
    }

    // 显示用户信息
    function displayUserInfo() {
        let roleBadge = '';
        if (currentUser.userType === 1) {
            roleBadge = '<span class="role-badge role-ta">TA</span>';
        } else if (currentUser.userType === 2) {
            roleBadge = '<span class="role-badge role-mo">MO</span>';
        } else if (currentUser.userType === 3) {
            roleBadge = '<span class="role-badge role-admin">Admin</span>';
        }
        document.getElementById('userDisplay').innerHTML =
            `欢迎，${currentUser.realName} (${currentUser.username}) ${roleBadge}`;
    }

    // 根据角色显示对应功能区
    function showRoleSection() {
        if (currentUser.userType === 1) {
            document.getElementById('taSection').classList.remove('hidden');
            loadOpenJobs();
        } else if (currentUser.userType === 2) {
            document.getElementById('moSection').classList.remove('hidden');
            loadMyJobs();
        } else if (currentUser.userType === 3) {
            document.getElementById('adminSection').classList.remove('hidden');
            loadAllUsers();
            loadAllJobs();
        }
    }

    // ==================== TA 功能 ====================

    // 加载招聘中岗位
    async function loadOpenJobs() {
        const r = await request('/job?action=listOpen');
        if (r.ok && r.data.code === 200) {
            const jobs = r.data.data;
            let html = '';
            if (jobs && jobs.length > 0) {
                jobs.forEach(job => {
                    html += `
                        <div class="card">
                            <div class="card-title">${job.jobName}</div>
                            <div class="card-meta">
                                ID: ${job.jobId} | 类型: ${job.jobType === 1 ? '助教' : '助理'} | 模块: ${job.belongModule}<br>
                                每周时长: ${job.workHoursWeekly}h | 招聘: ${job.recruitNum}人 | 截止: ${job.applyDeadline}
                            </div>
                            <div style="margin-bottom: 10px;">${job.jobDesc}</div>
                            <button class="btn" onclick="viewJobDetail('${job.jobId}', 'ta')">查看详情</button>
                            <button class="btn btn-success" onclick="applyJob('${job.jobId}')">申请此岗位</button>
                        </div>
                    `;
                });
            } else {
                html = '<p>暂无招聘中岗位</p>';
            }
            document.getElementById('openJobList').innerHTML = html;
            showResponse(r.data);
        }
    }

    // 查看岗位详情
    async function viewJobDetail(jobId, role) {
        currentJobId = jobId;
        const r = await request(`/job?action=getDetail&jobId=${jobId}`);
        if (r.ok && r.data.code === 200) {
            const job = r.data.data;
            document.getElementById('modalJobName').textContent = job.jobName;

            let content = `
                <div class="detail-item">
                    <span class="detail-label">岗位ID:</span>
                    <span>${job.jobId}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">岗位类型:</span>
                    <span>${job.jobType === 1 ? '助教' : '助理'}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">所属模块:</span>
                    <span>${job.belongModule}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">每周工作时长:</span>
                    <span>${job.workHoursWeekly} 小时</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">招聘人数:</span>
                    <span>${job.recruitNum} 人</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">申请截止日期:</span>
                    <span>${job.applyDeadline}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">岗位描述:</span>
                </div>
                <div style="background: #f8f9fa; padding: 10px; border-radius: 4px; margin-top: 5px;">
                    ${job.jobDesc}
                </div>
            `;

            document.getElementById('jobDetailContent').innerHTML = content;

            const applyBtn = document.getElementById('applyBtn');
            if (role === 'ta') {
                applyBtn.style.display = 'inline-block';
            } else {
                applyBtn.style.display = 'none';
            }

            document.getElementById('jobDetailModal').classList.remove('hidden');
            showResponse(r.data);
        } else {
            alert('获取岗位详情失败');
        }
    }

    // 点击遮罩层关闭
    function closeOnOverlay(event) {
        if (event.target.id === 'jobDetailModal') {
            closeJobDetail();
        }
    }

    // 关闭详情弹窗
    function closeJobDetail() {
        document.getElementById('jobDetailModal').classList.add('hidden');
        currentJobId = null;
    }

    // 从详情页申请
    async function applyFromDetail() {
        if (currentJobId) {
            await applyJob(currentJobId);
            closeJobDetail();
        }
    }

    // 申请岗位
    async function applyJob(jobId) {
        const r = await request(`/application?action=apply&jobId=${jobId}`, { method: 'POST' });
        if (r.ok) {
            alert(r.data.msg);
            showResponse(r.data);
            loadMyApplications();
        }
    }

    // 加载我的申请
    async function loadMyApplications() {
        const r = await request('/application?action=listMy');
        if (r.ok && r.data.code === 200) {
            const apps = r.data.data;
            let html = '';
            if (apps && apps.length > 0) {
                apps.forEach(app => {
                    html += `
                        <div class="card">
                            <div class="card-title">申请ID: ${app.applicationId}</div>
                            <div class="card-meta">
                                岗位ID: ${app.jobId} | 状态: ${app.status}
                            </div>
                        </div>
                    `;
                });
            } else {
                html = '<p>暂无申请记录</p>';
            }
            document.getElementById('myApplicationList').innerHTML = html;
            showResponse(r.data);
        }
    }

    // ==================== MO 功能 ====================

    // 发布岗位
    async function publishJob() {
        const params = new URLSearchParams();
        params.append('jobName', document.getElementById('jobName').value);
        params.append('jobType', document.getElementById('jobType').value);
        params.append('belongModule', document.getElementById('belongModule').value);
        params.append('jobDesc', document.getElementById('jobDesc').value);
        params.append('workHoursWeekly', document.getElementById('workHoursWeekly').value);
        params.append('recruitNum', document.getElementById('recruitNum').value);
        params.append('applyDeadline', document.getElementById('applyDeadline').value);

        const r = await request('/job?action=publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        });

        if (r.ok) {
            alert(r.data.msg);
            showResponse(r.data);
            if (r.data.code === 200) {
                loadMyJobs();
                document.getElementById('jobName').value = '';
                document.getElementById('belongModule').value = '';
                document.getElementById('jobDesc').value = '';
                document.getElementById('workHoursWeekly').value = '';
                document.getElementById('recruitNum').value = '';
                document.getElementById('applyDeadline').value = '';
            }
        }
    }

    // 加载我的岗位（MO）
    async function loadMyJobs() {
        const r = await request('/job?action=listMy');
        if (r.ok && r.data.code === 200) {
            const jobs = r.data.data;
            let html = '';
            if (jobs && jobs.length > 0) {
                jobs.forEach(job => {
                    html += `
                        <div class="card">
                            <div class="card-title">${job.jobName}</div>
                            <div class="card-meta">
                                ID: ${job.jobId} | 类型: ${job.jobType === 1 ? '助教' : '助理'} | 模块: ${job.belongModule}<br>
                                每周时长: ${job.workHoursWeekly}h | 招聘: ${job.recruitNum}人 | 已招: ${job.hiredNum}人 | 截止: ${job.applyDeadline}
                            </div>
                            <div style="margin-bottom: 10px;">${job.jobDesc}</div>
                            <button class="btn" onclick="viewJobDetail('${job.jobId}', 'mo')">查看详情</button>
                        </div>
                    `;
                });
            } else {
                html = '<p>暂无发布的岗位</p>';
            }
            document.getElementById('myJobList').innerHTML = html;
            showResponse(r.data);
        }
    }

    // 加载岗位申请人（MO）
    async function loadJobApplications() {
        const jobId = document.getElementById('queryJobId').value;
        if (!jobId) {
            alert('请输入岗位ID');
            return;
        }

        const r = await request(`/application?action=listByJob&jobId=${jobId}`);
        if (r.ok && r.data.code === 200) {
            const allApps = r.data.data;
            const pendingApps = allApps.filter(app => app.status == 0);

            let html = '';
            if (pendingApps && pendingApps.length > 0) {
                pendingApps.forEach(app => {
                    html += `
                        <div class="card" id="app-${app.applicationId}">
                            <div class="card-title">申请ID: ${app.applicationId}</div>
                            <div class="card-meta">
                                TA ID: ${app.taId} | TA姓名: ${app.taRealName || '无'}
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-success" onclick="auditApplication('${app.applicationId}', 1)">通过</button>
                                <button class="btn btn-danger" onclick="auditApplication('${app.applicationId}', 2)">拒绝</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                html = '<p>暂无待审核的申请人</p>';
            }

            document.getElementById('jobApplicationList').innerHTML = html;
            showResponse(r.data);
        }
    }

    // 审核申请（MO）
    async function auditApplication(applicationId, auditStatus) {
        const appCard = document.getElementById(`app-${applicationId}`);
        const btns = appCard.querySelectorAll('button');
        btns.forEach(btn => {
            btn.disabled = true;
            btn.style.opacity = '0.5';
        });

        const params = new URLSearchParams();
        params.append('applicationId', applicationId);
        params.append('auditStatus', auditStatus);
        params.append('remark', auditStatus === 1 ? '通过' : '拒绝');

        const r = await request('/application?action=audit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        });

        if (r.ok) {
            alert(r.data.msg);
            showResponse(r.data);
            if (r.data.code === 200) {
                loadJobApplications();
            } else {
                btns.forEach(btn => {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                });
            }
        } else {
            btns.forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '1';
            });
        }
    }

    // ==================== Admin 功能（新增！） ====================

    // 加载所有用户
    async function loadAllUsers() {
        const r = await request('/admin?action=listUsers');
        if (r.ok && r.data.code === 200) {
            const users = r.data.data;
            let html = '';
            if (users && users.length > 0) {
                users.forEach(user => {
                    let roleText = '';
                    if (user.userType === 1) roleText = 'TA';
                    else if (user.userType === 2) roleText = 'MO';
                    else if (user.userType === 3) roleText = 'Admin';
                    else roleText = '未知';

                    html += `
                        <tr>
                            <td>${user.userId}</td>
                            <td>${user.username}</td>
                            <td>${user.realName}</td>
                            <td>${roleText}</td>
                            <td>${user.email || '无'}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteUser('${user.userId}')">删除</button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                html = '<tr><td colspan="6">暂无用户</td></tr>';
            }
            document.getElementById('userTableBody').innerHTML = html;
            showResponse(r.data);
        } else {
            alert('加载用户列表失败：' + (r.data?.msg || '未知错误'));
        }
    }

    // 删除用户
    async function deleteUser(userId) {
        if (!confirm('确定要删除该用户吗？')) {
            return;
        }

        const r = await request(`/admin?action=deleteUser&userId=${userId}`, { method: 'POST' });
        if (r.ok) {
            alert(r.data.msg);
            showResponse(r.data);
            if (r.data.code === 200) {
                loadAllUsers();
            }
        }
    }

    // 加载所有岗位
    async function loadAllJobs() {
        const r = await request('/admin?action=listAllJobs');
        if (r.ok && r.data.code === 200) {
            const jobs = r.data.data;
            let html = '';
            if (jobs && jobs.length > 0) {
                jobs.forEach(job => {
                    let statusText = '';
                    if (job.jobStatus === 0) statusText = '<span style="color:green">招聘中</span>';
                    else if (job.jobStatus === 1) statusText = '<span style="color:orange">已截止</span>';
                    else if (job.jobStatus === 2) statusText = '<span style="color:red">已招满</span>';
                    else if (job.jobStatus === 3) statusText = '<span style="color:gray">已关闭</span>';
                    else statusText = '未知';

                    html += `
                        <tr>
                            <td>${job.jobId}</td>
                            <td>${job.jobName}</td>
                            <td>${job.publisherMoId}</td>
                            <td>${job.recruitNum}</td>
                            <td>${statusText}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteJob('${job.jobId}')">删除</button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                html = '<tr><td colspan="6">暂无岗位</td></tr>';
            }
            document.getElementById('jobTableBody').innerHTML = html;
            showResponse(r.data);
        } else {
            alert('加载岗位列表失败：' + (r.data?.msg || '未知错误'));
        }
    }

    // 删除岗位
    async function deleteJob(jobId) {
        if (!confirm('确定要删除该岗位吗？这将级联删除相关申请！')) {
            return;
        }

        const r = await request(`/admin?action=deleteJob&jobId=${jobId}`, { method: 'POST' });
        if (r.ok) {
            alert(r.data.msg);
            showResponse(r.data);
            if (r.data.code === 200) {
                loadAllJobs();
            }
        }
    }

    // 查看用户详情
    async function loadUserDetail() {
        const userId = document.getElementById('detailUserId').value;
        if (!userId) {
            alert('请输入用户ID');
            return;
        }

        const r = await request(`/admin?action=getUserDetail&userId=${userId}`);
        if (r.ok && r.data.code === 200) {
            document.getElementById('userDetailContent').textContent = JSON.stringify(r.data.data, null, 2);
            showResponse(r.data);
        } else {
            document.getElementById('userDetailContent').textContent = '获取失败：' + (r.data?.msg || '未知错误');
            alert('获取用户详情失败');
        }
    }

    // 退出登录
    async function logout() {
        try {
            await request('/user?action=logout', { method: 'POST' });
        } catch (e) {
            console.log(e);
        }
        alert('退出成功');
        location.href = 'index.html';
    }
</script>

</body>
</html>
